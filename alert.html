<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ถึงเวลาเปลี่ยนท่า</title>
  <link rel="stylesheet" href="alert.css" />
</head>
<body>
  <div class="alert" id="alert">
    <div class="emoji" id="emoji">🪑</div>
    <div class="label" id="label">กำลังโหลด…</div>
    <div class="hint" id="hint"></div>
    <div class="time" id="time">--:--</div>
    <div class="controls">
      <button class="btn ghost" id="snooze">เลื่อน</button>
      <button class="btn primary" id="ack">ลุกแล้ว ✓</button>
    </div>
  </div>
  <script src="alert.js"></script>
</body>
</html>
